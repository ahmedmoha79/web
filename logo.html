<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WAZAMBI GPS Logo</title>
  <style>
    body {
      margin: 0;
      background-color: #0B1D3D; /* Navy blue */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    .logo-container {
      text-align: center;
      color: #D1AD85;
    }

    .logo-text h1 {
      font-size: 48px;
      margin: 10px 0 0 0;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #D1AD85;
    }

    .logo-text h2 {
      font-size: 36px;
      margin: 5px 0 0 0;
      font-weight: 600;
      color: #D1AD85;
    }

    svg {
      width: 220px;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Stylized W -->
      <polygon fill="#D1AD85" points="20,50 55,110 80,80 100,105 120,80 145,110 180,50 155,50 125,95 100,70 75,95 45,50" />
      
      <!-- GPS pin (outer circle + tip) -->
      <path fill="#D1AD85" d="
        M100,25
        a15,15 0 1,1 -0.01,0
        l0,0
        c-7.5,10 -7.5,20 0,30
        c7.5,-10 7.5,-20 0,-30z" />
      
      <!-- GPS pin inner hole -->
      <circle cx="100" cy="40" r="6" fill="#0B1D3D" />
    </svg>

    <!-- Text below logo -->
    <div class="logo-text">
      <h1>WAZAMBI</h1>
      <h2>GPS</h2>
    </div>
  </div>
</body>
</html>
