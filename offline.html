<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Wazambi Fleet Tracker PRO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .offline-container {
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #D2B48C;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .retry-button {
            background: linear-gradient(135deg, #2a5bd7, #1a1a2a);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .retry-button:hover {
            transform: translateY(-2px);
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #2a5bd7;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="status-icon pulse">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! Some features of Wazambi Fleet Tracker PRO are still available offline. We'll automatically reconnect when your network is back.</p>
        <button class="retry-button" onclick="window.location.reload()">
            Try Again
        </button>
    </div>

    <script>
        // Check for network status changes
        window.addEventListener('online', () => window.location.reload());
        
        // Attempt to load cached resources
        if ('serviceWorker' in navigator && 'caches' in window) {
            caches.match('/').then(response => {
                if (response) {
                    console.log('Loaded cached version');
                }
            });
        }
    </script>
</body>
</html>
